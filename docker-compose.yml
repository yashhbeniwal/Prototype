services:
  postgres:
    image: postgres:16-alpine
    container_name: goatfarm_db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goatfarm_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: goatfarm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goatfarm_backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/goatfarm_erp
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: goatfarm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000
    container_name: goatfarm_frontend
    restart: unless-stopped
    ports:
      - '3003:3000'
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000

volumes:
  postgres_data:
  uploads_data:

networks:
  default:
    name: goatfarm_network
